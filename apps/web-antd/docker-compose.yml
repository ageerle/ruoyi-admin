services:
  # ==================== RuoYi-AI 前端服务 ====================
  frontend:
    image: ruoyi-ai-admin:latest
    build:
      context: ../..
      dockerfile: apps/web-antd/Dockerfile
      tags:
        - ruoyi-ai-admin:latest
    container_name: ruoyi-ai-admin
    restart: always
    ports:
      - "5666:5666"
    environment:
      # 后端 API 地址 - 运行时动态配置（无需重新构建镜像）
      # 在完整 docker-compose 中应设置为: http://backend:6039
      # 独立运行时可设置为实际后端地址，如: 192.168.1.100:6039
      UPSTREAM_HOST: ${UPSTREAM_HOST:-127.0.0.1:6039}
    # 资源限制 - 防止 CPU 和内存耗尽
    deploy:
      resources:
        limits:
          cpus: '2'          # 限制最多使用 2 个 CPU 核心
          memory: 3G         # 限制内存使用为 3GB
        reservations:
          cpus: '1'          # 保留 1 个 CPU 核心
          memory: 1G         # 保留 1GB 内存
    networks:
      - ruoyi-net

# ==================== 网络配置 ====================
networks:
  ruoyi-net:
    driver: bridge
