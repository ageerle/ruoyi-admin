services:
  # ==================== RuoYi-AI 前端服务 ====================
  frontend:
    build:
      context: ../..
      dockerfile: apps/web-antd/Dockerfile
      args:
        # 后端 API 地址 - 构建时传入
        VITE_GLOB_API_URL: ${VITE_GLOB_API_URL:-http://localhost:6039}
    container_name: ruoyi-ai-admin
    restart: always
    ports:
      - "5666:5666"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - ruoyi-net

# ==================== 网络配置 ====================
networks:
  ruoyi-net:
    driver: bridge
